<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>물류 파트 Daily Production Report</title>
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="icons/icon.svg">
</head>
<body>
<div class="viz-root">

  <div class="note-toolbar-row">
    <span class="today-label">기준일 <span class="tab-date" id="tab-date">-</span></span>
    <div class="note-toolbar">
      <div class="date-nav">
        <input type="date" id="date-picker">
        <button type="button" id="btn-today">오늘</button>
      </div>
      <span id="note-status" class="note-status"></span>
      <button type="button" class="toolbar-btn" id="btn-search">검색</button>
      <a href="admin.html" class="toolbar-btn">관리</a>
    </div>
  </div>

  <div class="top-bar">
    <h1>Production Daily Report</h1>
    <div class="meta" id="meta-info">로딩 중...</div>
  </div>

  <div class="status-strip" id="status-strip">
    <span><span class="pending">○</span> 데이터 로딩 중</span>
  </div>

  <div class="staff-strip" id="staff-strip">
    <div class="staff-label">투입인원</div>
    <div class="staff-team"><span class="staff-team-name">데이터 없음</span></div>
  </div>

  <div class="main-layout">
    <!-- 좌측 사이드바 -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">공통 공지사항</div>
        <div id="common-notices">
          <div class="sidebar-empty">등록된 공지 없음</div>
        </div>
        <div class="common-note-input-wrap">
          <input type="text" class="common-note-input" id="common-note-input" placeholder="공지 입력 후 Enter...">
        </div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">주간 일정</div>
        <div id="week-calendar" class="week-calendar"></div>
      </div>
      <div class="sidebar-section alert-section" id="alerts-section" style="display:none;">
        <div class="sidebar-title alert-title" id="alerts-title">시스템 경고</div>
        <div id="alerts-list"></div>
      </div>
      <div class="sidebar-section material-section" id="material-section" style="display:none;">
        <div class="sidebar-title material-title" id="material-title">자재 부족 현황</div>
        <div id="material-list"></div>
      </div>
    </aside>

    <!-- 우측 메인 보드 -->
    <div class="board-main">
      <div class="kpi-strip" id="kpi-strip">
        <div class="kpi-tile"><span class="label">주간 가동</span><span class="value" id="kpi-day">-</span></div>
        <div class="kpi-tile"><span class="label">야간 가동</span><span class="value" id="kpi-night">-</span></div>
        <div class="kpi-tile switch-kpi"><span class="label">ITEM 변경</span><span class="value" id="kpi-switch">-</span></div>
        <div class="kpi-tile"><span class="label">재가동</span><span class="value" id="kpi-resume">-</span></div>
      </div>
      <div id="board-container">
        <div class="loading-overlay">데이터 로딩 중...</div>
      </div>
    </div>
  </div>

</div>

<!-- 검색 패널 -->
<div id="search-panel" class="search-panel" style="display:none;">
  <div class="search-panel-inner">
    <div class="search-header">
      <span class="search-title">기록 검색</span>
      <button type="button" class="search-close" id="search-close">×</button>
    </div>
    <div class="search-input-row">
      <input type="text" id="search-input" class="search-input" placeholder="키워드 입력 (전달사항, 인수인계, 공지 등)">
      <button type="button" id="search-go" class="search-go-btn">검색</button>
    </div>
    <div id="search-results" class="search-results"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
